benchmark_frameworks:
  adult_learning:
    principles:
      - learner_orientation
      - self_directed_use
      - authentic_task_relevance
      - scaffolded_progression
      - reflection_and_feedback
  professional_education:
    principles:
      - explicit_learning_objectives
      - practice_aligned_instruction
      - assessment_fit
      - level_disclosure
      - provenance_and_reviewability
  pathology_spec_alignment:
    principles:
      - discipline_classification
      - syllabus_topic_mapping
      - level_mapping
      - promotion_rationale

promotion_gates:
  - id: orientation
    description: Learner can identify module type, audience, and purpose quickly.
  - id: objective_clarity
    description: Observable learning objectives are present.
  - id: workflow_relevance
    description: Content teaches a pathology task such as diagnosis, workup, or differential reasoning.
  - id: assessment_fit
    description: Assessment pattern matches the content surface.
  - id: path_spec_traceability
    description: Content maps to AP/CP syllabus topics and level.
  - id: content_integrity
    description: Promoted content is curated, deduplicated, and provenance-retaining.
  - id: ux_readiness
    description: Canonical navigation placement and cross-links are defined.

conformance_levels:
  L0: no_pathology_spec_mapping
  L1: discipline_only
  L2: syllabus_mapped
  L3: syllabus_and_level_mapped
  L4: mapped_and_cross_linked

